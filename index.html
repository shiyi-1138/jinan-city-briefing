<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>济南城市情报简报</title>
  <style>
    :root {
      --ink: #122033;
      --muted: #68778b;
      --line: #dfe6ee;
      --paper: #ffffff;
      --canvas: #f3f6f9;
      --navy: #10253f;
      --blue: #1877f2;
      --blue-soft: #eaf3ff;
      --cyan: #1e91a5;
      --shadow: 0 12px 30px rgba(17, 36, 61, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--canvas);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }
    button, input { font: inherit; }
    .topbar {
      color: #fff;
      background: var(--navy);
      padding: 24px clamp(20px, 4vw, 64px);
    }
    .topbar-inner {
      max-width: 1500px;
      margin: auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }
    h1 { margin: 0 0 5px; font-size: clamp(25px, 3vw, 38px); letter-spacing: -.04em; }
    .subtitle { margin: 0; color: #b9c8d8; font-size: 14px; }
    .updated { color: #d7e2ed; font-size: 13px; white-space: nowrap; }
    main { max-width: 1500px; margin: auto; padding: 24px clamp(16px, 4vw, 64px) 48px; }
    .scope-tabs {
      display: flex;
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px;
      background: var(--paper);
      box-shadow: 0 4px 15px rgba(17, 36, 61, .04);
    }
    .scope-tab {
      border: 0;
      border-radius: 8px;
      padding: 10px 18px;
      color: #536175;
      background: transparent;
      cursor: pointer;
      font-weight: 650;
    }
    .scope-tab.active { color: #fff; background: var(--blue); }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 18px 0;
    }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      background: var(--paper);
      color: #566579;
      cursor: pointer;
      font-size: 13px;
    }
    .filter.active { color: #1262c4; background: var(--blue-soft); border-color: #b9d8ff; }
    .search {
      min-width: 220px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      outline: none;
      background: var(--paper);
    }
    .search:focus { border-color: #7eb7ff; box-shadow: 0 0 0 3px #e7f2ff; }
    .workspace {
      display: flex;
      flex-direction: column-reverse;
      gap: 14px;
    }
    .table-shell, .map-panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .table-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .table-head h2 { margin: 0; font-size: 18px; }
    .count { color: var(--muted); font-size: 13px; }
    .table-wrap { overflow: hidden; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th:nth-child(1) { width: 9%; }
    th:nth-child(2) { width: 14%; }
    th:nth-child(3) { width: 14%; }
    th:nth-child(4) { width: 12%; }
    th:nth-child(5) { width: 34%; }
    th:nth-child(6) { width: 10%; }
    th:nth-child(7) { width: 7%; }
    th {
      padding: 12px 14px;
      text-align: left;
      color: #627187;
      background: #f7f9fb;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    td {
      padding: 15px 14px;
      border-bottom: 1px solid #ebeff4;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }
    tr { cursor: pointer; transition: background .15s; }
    tbody tr:hover, tbody tr.selected { background: #f1f7ff; }
    tbody tr:last-child td { border-bottom: 0; }
    .project { font-weight: 720; color: #15263b; }
    .category {
      display: inline-flex;
      border-radius: 5px;
      padding: 4px 7px;
      color: #176776;
      background: #e8f6f8;
      font-size: 12px;
      white-space: nowrap;
    }
    .source, .map-link {
      color: #176ad1;
      text-decoration: none;
      font-weight: 650;
    }
    .source:hover, .map-link:hover { text-decoration: underline; }
    .map-panel {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      min-height: 132px;
    }
    .map-visual {
      position: relative;
      height: 100%;
      min-height: 132px;
      overflow: hidden;
      background:
        linear-gradient(33deg, transparent 45%, #d9e3ec 46%, #d9e3ec 49%, transparent 50%) 0 0/120px 95px,
        linear-gradient(-22deg, transparent 44%, #dfe8ef 45%, #dfe8ef 48%, transparent 49%) 20px 10px/130px 110px,
        #edf3f6;
    }
    .river {
      position: absolute;
      width: 130%;
      height: 44px;
      top: 35px;
      left: -12%;
      border: 8px solid #aed7e2;
      border-left: 0;
      border-right: 0;
      border-radius: 50%;
      transform: rotate(-5deg);
    }
    .pin {
      position: absolute;
      left: 50%;
      top: 54%;
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      background: #e54c49;
      transform: translate(-50%, -50%) rotate(-45deg);
      box-shadow: 0 6px 16px rgba(144, 29, 29, .28);
    }
    .pin::after {
      content: "";
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #fff;
      left: 9px;
      top: 9px;
    }
    .map-label {
      position: absolute;
      left: 50%;
      top: calc(54% + 30px);
      transform: translateX(-50%);
      padding: 5px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 3px 10px rgba(17,36,61,.12);
      font-weight: 700;
      font-size: 12px;
      max-width: 80%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .map-info {
      padding: 16px 18px;
      display: grid;
      grid-template-columns: minmax(150px, .65fr) minmax(260px, 1.8fr) auto;
      align-items: center;
      gap: 18px;
    }
    .map-heading { min-width: 0; }
    .map-info h3 { margin: 0 0 6px; font-size: 17px; }
    .map-location { margin: 0; color: var(--muted); font-size: 12px; }
    .map-summary { margin: 0; color: #425168; font-size: 13px; line-height: 1.6; }
    .map-actions { display: flex; gap: 8px; margin: 0; }
    .map-button {
      display: inline-block;
      text-align: center;
      padding: 10px 9px;
      border: 1px solid #b8d5fa;
      border-radius: 8px;
      color: #145eae;
      background: #f2f7ff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .map-button.primary { color: #fff; background: var(--blue); border-color: var(--blue); }
    .empty { padding: 45px; text-align: center; color: var(--muted); }
    footer {
      max-width: 1500px;
      margin: auto;
      padding: 0 clamp(16px, 4vw, 64px) 35px;
      color: #758398;
      font-size: 12px;
    }
    @media (max-width: 1080px) {
      .map-panel { grid-template-columns: 120px minmax(0, 1fr); }
      .map-info { grid-template-columns: minmax(150px, .7fr) minmax(220px, 1.5fr); }
      .map-actions { grid-column: 1 / -1; }
      th, td { padding-left: 10px; padding-right: 10px; }
    }
    @media (max-width: 760px) {
      .topbar-inner, .toolbar { align-items: stretch; flex-direction: column; }
      .updated { white-space: normal; }
      .scope-tabs { width: 100%; }
      .scope-tab { flex: 1; padding-inline: 8px; }
      .search { width: 100%; min-width: 0; }
      .map-panel { display: block; }
      .map-visual { height: 130px; min-height: 0; }
      .map-info { display: block; }
      .map-summary { margin-top: 10px; }
      .map-actions { margin-top: 12px; }
      table, thead, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }
      tbody { padding: 8px 12px; }
      tbody tr {
        margin: 0 0 12px;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: 10px;
      }
      tbody tr:last-child { margin-bottom: 0; }
      td {
        display: grid;
        grid-template-columns: 82px minmax(0, 1fr);
        gap: 8px;
        padding: 7px 0;
        border-bottom: 1px dashed #e5ebf1;
      }
      td::before {
        content: attr(data-label);
        color: #728095;
        font-size: 12px;
        font-weight: 650;
      }
      td:last-child { border-bottom: 0; }
    }
  </style>
</head>

    const escapeHtml = value => String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    function mapUrls(item) {
      const q = encodeURIComponent(`济南市 ${item[2]} ${item[1]}`);
      return {
        amap: `https://uri.amap.com/search?keyword=${q}&city=济南&view=map`,
        baidu: `https://map.baidu.com/search/${q}/@12950165,4382736,12z`
      };
    }
    function showMap(item) {
      const urls = mapUrls(item);
      document.querySelector("#mapTitle").textContent = item[1];
      document.querySelector("#mapLocation").textContent = item[2];
      document.querySelector("#mapSummary").textContent = item[4];
      document.querySelector("#mapLabel").textContent = item[2];
      document.querySelector("#amapLink").href = urls.amap;
      document.querySelector("#baiduLink").href = urls.baidu;
    }
    function filteredData() {
      const term = search.value.trim().toLowerCase();
      return data[scope].filter(item =>
        (category === "全部" || item[0] === category) &&
        (!term || item.slice(0, 5).join(" ").toLowerCase().includes(term))
      );
    }
    function renderFilters() {
      const cats = ["全部", ...new Set(data[scope].map(item => item[0]))];
      if (!cats.includes(category)) category = "全部";
      filters.innerHTML = cats.map(cat =>
        `<button class="filter ${cat === category ? "active" : ""}" data-category="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`
      ).join("");
      filters.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
        category = btn.dataset.category; selected = 0; renderFilters(); renderRows();
      }));
    }
    function renderRows() {
      const visible = filteredData();
      document.querySelector("#count").textContent = `共 ${visible.length} 条`;
      document.querySelector("#empty").hidden = visible.length > 0;
      rows.innerHTML = visible.map((item, index) => {
        const urls = mapUrls(item);
        const source = item[6] ? `<a class="source" href="${item[6]}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(item[5])}</a>` : escapeHtml(item[5]);
        return `<tr class="${index === selected ? "selected" : ""}" data-index="${index}">
          <td data-label="项目分类"><span class="category">${escapeHtml(item[0])}</span></td>
          <td data-label="项目名称" class="project">${escapeHtml(item[1])}</td>
          <td data-label="项目位置">${escapeHtml(item[2])}</td>
          <td data-label="项目时间">${escapeHtml(item[3])}</td>
          <td data-label="重点内容">${escapeHtml(item[4])}</td>
          <td data-label="信息来源">${source}</td>
          <td data-label="地图"><a class="map-link" href="${urls.amap}" target="_blank" rel="noopener" onclick="event.stopPropagation()">查看地图</a></td>
        </tr>`;
      }).join("");
      rows.querySelectorAll("tr").forEach(tr => tr.addEventListener("click", () => {
        selected = Number(tr.dataset.index); renderRows();
      }));
      if (visible.length) {
        selected = Math.min(selected, visible.length - 1);
        showMap(visible[selected]);
      }
    }
    document.querySelectorAll(".scope-tab").forEach(tab => tab.addEventListener("click", () => {
      scope = tab.dataset.scope; category = "全部"; selected = 0; search.value = "";
      document.querySelectorAll(".scope-tab").forEach(t => t.classList.toggle("active", t === tab));
      document.querySelector("#sectionTitle").textContent = scope === "local" ? "龙园小区周边信息" : "济南市重点信息";
      renderFilters(); renderRows();
    }));
    search.addEventListener("input", () => { selected = 0; renderRows(); });
    renderFilters(); renderRows();
  </script>
</body>
</html>
